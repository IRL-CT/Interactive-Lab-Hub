<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQTT Shooting Game</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }

        .header {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 30px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .status {
            font-size: 14px;
            opacity: 0.8;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff00;
            margin-right: 5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .game-container {
            position: relative;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 15px;
        }

        #gameCanvas {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            display: block;
            background: #000;
        }

        .game-over-overlay {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            z-index: 1000;
        }

        .game-over-overlay.show {
            display: block;
        }

        .winner-text {
            font-size: 36px;
            margin-bottom: 20px;
            color: #FFD700;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        button:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .player-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 15px;
        }

        .player-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .player-card h3 {
            margin-bottom: 10px;
        }

        .health-bars {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 10px;
        }

        .health-bar {
            width: 30px;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .health-bar.active {
            background: #00ff00;
        }

        .health-bar.hit {
            background: #ff0000;
        }

        .topic-info {
            margin-top: 5px;
            font-size: 11px;
            opacity: 0.6;
            font-family: 'Courier New', monospace;
        }

        .instructions {
            margin-top: 15px;
            font-size: 12px;
            text-align: center;
            opacity: 0.7;
            max-width: 800px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎮 MQTT Shooting Game</h1>
        <div class="status">
            <span class="status-dot"></span>
            <span>Connected to farlab.infosci.cornell.edu:1883</span>
        </div>
    </div>

    <div class="game-container">
        <canvas id="gameCanvas" width="1200" height="600"></canvas>
        <div class="game-over-overlay" id="gameOverOverlay">
            <div class="winner-text" id="winnerText"></div>
            <button onclick="restartGame()">Play Again</button>
        </div>
    </div>

    <div class="player-info">
        <div class="player-card" style="border-left: 4px solid #0000FF;">
            <h3>🔵 Player 1 (Blue)</h3>
            <div>Hits: <span id="p1Hits">0</span> / 3</div>
            <div class="health-bars" id="p1Health">
                <div class="health-bar active"></div>
                <div class="health-bar active"></div>
                <div class="health-bar active"></div>
            </div>
            <div class="topic-info">IDD/game/player1</div>
        </div>

        <div class="player-card" style="border-left: 4px solid #FF0000;">
            <h3>🔴 Player 2 (Red)</h3>
            <div>Hits: <span id="p2Hits">0</span> / 3</div>
            <div class="health-bars" id="p2Health">
                <div class="health-bar active"></div>
                <div class="health-bar active"></div>
                <div class="health-bar active"></div>
            </div>
            <div class="topic-info">IDD/game/player2</div>
        </div>
    </div>

    <div class="instructions">
        💡 Send joystick messages to <code>IDD/game/player1</code> and <code>IDD/game/player2</code><br>
        Format: <code>{"joy_x": 0.5, "joy_y": -0.3, "shoot": false}</code>
    </div>

    <script>
        // Game Configuration
        const SCREEN_WIDTH = 1200;
        const SCREEN_HEIGHT = 600;
        const FPS = 60;
        const MAX_HITS = 3;
        const PLAYER_SPEED = 2;
        const BULLET_SPEED = 10;
        const BULLET_SIZE = 8;
        const PLAYER_SIZE = 50;

        // Get canvas and context
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Socket.IO connection
        const socket = io();

        // Game State
        let gameRunning = true;
        let gameOver = false;
        let winner = null;

        // Player class
        class Player {
            constructor(x, y, color, side) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.side = side;
                this.width = PLAYER_SIZE;
                this.height = PLAYER_SIZE;
                this.hits = 0;
                this.alive = true;
                this.targetX = x;
                this.targetY = y;
            }

            moveToTarget() {
                if (this.x < this.targetX) {

                    this.y = Math.min(this.y + PLAYER_SPEED, this.targetY);
                } else if (this.y > this.targetY) {
                    this.y = Math.max(this.y - PLAYER_SPEED, this.targetY);

            }

                // Treat joystick as velocity
                this.x += joyX * PLAYER_SPEED;
                this.y += joyY * PLAYER_SPEED;

                // Clamp to bounds
                this.x = Math.max(0, Math.min(this.x, SCREEN_WIDTH - this.width));
                this.y = Math.max(0, Math.min(this.y, SCREEN_HEIGHT - this.height));

                // Keep target equal to current so moveToTarget() does nothing
                this.targetX = this.x;
                this.targetY = this.y;
            }

            getHit() {
                if (this.alive) {
                    this.hits++;
                    if (this.hits >= MAX_HITS) {
                        this.alive = false;
                        return true;
                    }
                }
                return false;
            }

            collidesWith(bullet) {
                return (
                    bullet.x < this.x + this.width &&
                    bullet.x + BULLET_SIZE > this.x &&
                    bullet.y < this.y + this.height &&
                    bullet.y + BULLET_SIZE > this.y
                );
            }

            draw() {
                if (this.alive) {
                    ctx.fillStyle = this.color;
                    ctx.fillRect(this.x, this.y, this.width, this.height);

                    // Draw health bars
                    for (let i = 0; i < MAX_HITS; i++) {
                        const barColor = i >= this.hits ? '#00ff00' : '#ff0000';
                        ctx.fillStyle = barColor;
                        ctx.fillRect(this.x + i * 18, this.y - 15, 15, 8);
                    }
                } else {
                    // Draw X for dead player
                    ctx.strokeStyle = '#888';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x + this.width, this.y + this.height);
                    ctx.moveTo(this.x + this.width, this.y);
                    ctx.lineTo(this.x, this.y + this.height);
                    ctx.stroke();
                }
            }
        }

        // Bullet class
        class Bullet {
            constructor(x, y, direction) {
                this.x = x;
                this.y = y;
                this.direction = direction;
                this.size = BULLET_SIZE;
                this.active = true;
            }

            update() {
                this.x += BULLET_SPEED * this.direction;

                if (this.x < 0 || this.x > SCREEN_WIDTH) {
                    this.active = false;
                }
            }

            draw() {
                if (this.active) {
                    ctx.fillStyle = '#FFFF00';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size / 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        // Initialize players
        let player1 = new Player(50, SCREEN_HEIGHT / 2, '#0000FF', 'left');
        let player2 = new Player(SCREEN_WIDTH - 100, SCREEN_HEIGHT / 2, '#FF0000', 'right');
        let bullets = [];

        // Socket.IO event handlers
        socket.on('connect', () => {
            console.log('Connected to server');
        });

        socket.on('disconnect', () => {
            console.log('Disconnected from server');
        });

        socket.on('game_state', (data) => {
            console.log('Received game state:', data);
            // Could sync state from server if needed
        });

        socket.on('mqtt_message', (data) => {
            // console.log('MQTT message:', data);
            handleMQTTMessage(data.topic, data.payload);
        });

        // Handle MQTT messages
        function handleMQTTMessage(topic, payload) {
            let player, bulletDirection;

            if (topic === 'IDD/game/player1') {
                player = player1;
                bulletDirection = 1;
            } else if (topic === 'IDD/game/player2') {
                player = player2;
                bulletDirection = -1;
            } else {
                return;
            }
        
            // Handle movement
            if ('joy_x' in payload && 'joy_y' in payload) {
                if (payload.joy_x == 0.0 && payload.joy_y == 0.0) {
                    console.log('Joystick centered, no movement');
                }else{
                    player.setTargetFromJoystick(payload.joy_x, payload.joy_y);
                }
            }

            // Handle shooting
            if (payload.shoot && player.alive) {
                shoot(player, bulletDirection);
            }
        }

        // Shoot function
        function shoot(player, direction) {
            if (player.alive) {
                const bulletX = player.x + player.width / 2;
                const bulletY = player.y + player.height / 2;
                bullets.push(new Bullet(bulletX, bulletY, direction));
            }
        }

        // Check collisions
        function checkCollisions() {
            bullets.forEach(bullet => {
                if (!bullet.active) return;

                if (bullet.direction === -1 && player1.alive) {
                    if (player1.collidesWith(bullet)) {
                        bullet.active = false;
                        if (player1.getHit()) {
                            endGame('Player 2 (Red)');
                        }
                        updateHealthDisplay();
                    }
                } else if (bullet.direction === 1 && player2.alive) {
                    if (player2.collidesWith(bullet)) {
                        bullet.active = false;
                        if (player2.getHit()) {
                            endGame('Player 1 (Blue)');
                        }
                        updateHealthDisplay();
                    }
                }
            });
        }

        // Update health display
        function updateHealthDisplay() {
            document.getElementById('p1Hits').textContent = player1.hits;
            document.getElementById('p2Hits').textContent = player2.hits;

            const p1HealthBars = document.getElementById('p1Health').children;
            const p2HealthBars = document.getElementById('p2Health').children;

            for (let i = 0; i < MAX_HITS; i++) {
                p1HealthBars[i].className = i < player1.hits ? 'health-bar hit' : 'health-bar active';
                p2HealthBars[i].className = i < player2.hits ? 'health-bar hit' : 'health-bar active';
            }
        }

        // End game
        function endGame(winnerName) {
            gameOver = true;
            winner = winnerName;
            document.getElementById('winnerText').textContent = `${winnerName} WINS! 🏆`;
            document.getElementById('gameOverOverlay').classList.add('show');
        }

        // Restart game
        function restartGame() {
            player1 = new Player(50, SCREEN_HEIGHT / 2, '#0000FF', 'left');
            player2 = new Player(SCREEN_WIDTH - 100, SCREEN_HEIGHT / 2, '#FF0000', 'right');
            bullets = [];
            gameOver = false;
            winner = null;
            document.getElementById('gameOverOverlay').classList.remove('show');
            updateHealthDisplay();
            
            // Notify server
            socket.emit('restart_game');
        }

        // Game loop
        function gameLoop() {
            if (!gameOver) {
                // Update
                player1.moveToTarget();
                player2.moveToTarget();

                bullets.forEach(bullet => bullet.update());
                bullets = bullets.filter(b => b.active);

                checkCollisions();
            }

            // Draw
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, SCREEN_WIDTH, SCREEN_HEIGHT);

            // Draw center line
            ctx.strokeStyle = '#FFF';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(SCREEN_WIDTH / 2, 0);
            ctx.lineTo(SCREEN_WIDTH / 2, SCREEN_HEIGHT);
            ctx.stroke();

            // Draw players
            player1.draw();
            player2.draw();

            // Draw bullets
            bullets.forEach(bullet => bullet.draw());

            // Draw UI text
            ctx.fillStyle = '#FFF';
            ctx.font = '20px Arial';
            ctx.fillText(`Player 1 (Blue) - Hits: ${player1.hits}/${MAX_HITS}`, 10, 30);
            ctx.fillText(`Player 2 (Red) - Hits: ${player2.hits}/${MAX_HITS}`, SCREEN_WIDTH - 280, 30);

            requestAnimationFrame(gameLoop);
        }

        // Start game loop
        gameLoop();
    </script>
</body>
</html>
