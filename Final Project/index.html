<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Inner Constellation</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: black;
        overflow: hidden;
        font-family: "Arial", sans-serif;
    }

    #view {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        object-position: center;
        z-index: 1;
    }

    #hud {
        position: fixed;
        top: 40px;
        right: 40px;
        z-index: 2;
        text-align: right;
        color: white;
        font-family: "Segoe UI", "Helvetica Neue", sans-serif;
        text-shadow: 0 0 6px rgba(0,0,0,0.8);
    }

    #hud h1 {
        margin: 0;
        font-size: 36px;
        font-weight: 600;
        line-height: 1.2;
    }

    #hud h2 {
        margin: 8px 0 16px;
        font-size: 22px;
        font-weight: 400;
    }

    #reset-btn {
        padding: 8px 16px;
        font-size: 14px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.7);
        background: rgba(0,0,0,0.35);
        color: #ffffff;
        cursor: pointer;
        backdrop-filter: blur(6px);
        transition: background 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
    }

    #reset-btn:hover {
        background: rgba(255,255,255,0.15);
        box-shadow: 0 0 12px rgba(255,255,255,0.4);
        transform: translateY(-1px);
    }

    #reset-btn:active {
        transform: translateY(0);
        box-shadow: 0 0 4px rgba(255,255,255,0.25);
    }

    #status {
        margin-top: 8px;
        font-size: 12px;
        opacity: 0.9;
    }
</style>

</head>

<body>

<img id="view" src="/frame">

<div id="hud">
    <h1>Inner Constellation</h1>
    <h2>Energy Field Active</h2>
    <button id="reset-btn">Reselect Elements</button>
    <div id="status"></div>
</div>

<script>
    // Periodically refresh the <img> tag to get the latest frame
    setInterval(() => {
        const img = document.getElementById("view");
        img.src = "/frame?" + new Date().getTime();
    }, 60);

    // Handle reset button click
    const resetBtn = document.getElementById("reset-btn");
    const statusLabel = document.getElementById("status");

    resetBtn.addEventListener("click", () => {
        resetBtn.disabled = true;
        statusLabel.textContent = "Resetting… please reselect 3 elements on the device.";

        fetch("/reset", { method: "POST" })
            .then(() => {
                // Small delay to make it feel responsive
                setTimeout(() => {
                    resetBtn.disabled = false;
                    statusLabel.textContent = "Ready for a new energy combination.";
                }, 500);
            })
            .catch((err) => {
                console.error("Reset error:", err);
                resetBtn.disabled = false;
                statusLabel.textContent = "Reset failed. Check server console.";
            });
    });
</script>

</body>
</html>
